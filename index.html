<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Senhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F5F2;
      --surface:   #FFFFFF;
      --border:    #E4DFD8;
      --text:      #1A1714;
      --muted:     #8C8178;
      --accent:    #3D6B4F;
      --accent-lt: #EAF2EC;
      --danger:    #C0392B;
      --warn:      #D4881A;
      --ok:        #3D6B4F;
      --radius:    14px;
      --shadow:    0 2px 16px rgba(0,0,0,.06);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fraunces', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C0B4 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .35;
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 2.25rem 2.25rem;
      position: relative;
    }

    /* decorative accent line top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 2rem; right: 2rem;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #6BA888);
      border-radius: 0 0 4px 4px;
    }

    /* ── HEADER ── */
    .header { margin-bottom: 1.75rem; }

    .header h1 {
      font-size: 1.65rem;
      font-weight: 300;
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    .header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .header p {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      margin-top: .35rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      flex: 1;
      padding: .55rem .75rem;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: .03em;
      transition: all .2s ease;
    }

    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── SECTION ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── LABEL ── */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .5rem;
      display: block;
    }

    /* ── SIZE PICKER ── */
    .size-group {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }

    .size-btn {
      flex: 1;
      padding: .55rem .5rem;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      color: var(--text);
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }

    .size-btn span {
      display: block;
      font-size: .62rem;
      color: var(--muted);
      margin-top: .1rem;
      letter-spacing: .04em;
    }

    .size-btn:hover { border-color: var(--accent); }

    .size-btn.selected {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent);
    }

    .size-btn.selected span { color: var(--accent); opacity: .75; }

    /* ── OPTIONS (checkboxes) ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }

    .opt-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem .65rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--text);
      transition: all .2s;
      user-select: none;
    }

    .opt-label:hover { border-color: var(--accent); }

    .opt-label input { display: none; }

    .opt-label .check {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
    }

    .opt-label input:checked ~ .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .opt-label input:checked ~ .check::after {
      content: '';
      display: block;
      width: 5px; height: 8px;
      border: 1.5px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .opt-label input:checked ~ span { color: var(--accent); }

    /* ── GENERATE BUTTON ── */
    .gen-btn {
      width: 100%;
      padding: .85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: .01em;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 1.25rem;
    }

    .gen-btn:hover {
      background: #2e5139;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(61,107,79,.25);
    }

    .gen-btn:active { transform: translateY(0); }

    /* ── OUTPUT BOX ── */
    .output-wrap {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color .3s;
    }

    .output-wrap.has-value { border-color: #C8C0B4; }

    .output-text {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: .08em;
      color: var(--text);
      word-break: break-all;
      flex: 1;
      min-width: 0;
    }

    .output-text.empty {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .04em;
    }

    .copy-btn {
      padding: .4rem .75rem;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .copy-btn.copied {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── STRENGTH BAR ── */
    .strength-wrap {
      margin-top: 1rem;
      display: none;
    }

    .strength-wrap.visible { display: block; }

    .strength-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .4rem;
    }

    .strength-label {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }

    .strength-word {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      letter-spacing: .04em;
      font-weight: 500;
    }

    .strength-bar-bg {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .5s ease, background .4s ease;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0 1.25rem;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: .63rem;
      color: var(--muted);
      letter-spacing: .04em;
      margin-top: 1.5rem;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── ANIMATIONS ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-text.animate { animation: slideIn .25s ease; }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .output-wrap.pop { animation: pop .2s ease; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Gerador de <em>Senhas</em></h1>
    <p>password_generator · v1.0</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('password')">Senha</button>
    <button class="tab-btn" onclick="switchTab('pin')">PIN numérico</button>
  </div>

  <!-- ── PASSWORD SECTION ── -->
  <div class="section active" id="section-password">
    <label class="label">Tamanho</label>
    <div class="size-group" id="size-group-password">
      <button class="size-btn selected" data-val="8" onclick="selectSize('password', this)">
        8 <span>caracteres</span>
      </button>
      <button class="size-btn" data-val="12" onclick="selectSize('password', this)">
        12 <span>caracteres</span>
      </button>
      <button class="size-btn" data-val="18" onclick="selectSize('password', this)">
        18 <span>caracteres</span>
      </button>
    </div>

    <label class="label">Incluir</label>
    <div class="options-grid">
      <label class="opt-label">
        <input type="checkbox" id="opt-lower" checked />
        <span class="check"></span>
        <span>minúsculas</span>
      </label>
      <label class="opt-label">
        <input type="checkbox" id="opt-upper" checked />
        <span class="check"></span>
        <span>MAIÚSCULAS</span>
      </label>
      <label class="opt-label">
        <input type="checkbox" id="opt-digits" checked />
        <span class="check"></span>
        <span>números</span>
      </label>
      <label class="opt-label">
        <input type="checkbox" id="opt-special" checked />
        <span class="check"></span>
        <span>símbolos</span>
      </label>
    </div>

    <button class="gen-btn" onclick="generate('password')">Gerar senha</button>

    <div class="output-wrap" id="output-password">
      <span class="output-text empty" id="text-password">sua senha aparece aqui</span>
      <button class="copy-btn" id="copy-password" onclick="copyText('password')">copiar</button>
    </div>

    <div class="strength-wrap" id="strength-wrap">
      <hr class="divider" style="margin-top:.85rem; margin-bottom:.85rem;" />
      <div class="strength-row">
        <span class="strength-label">Força</span>
        <span class="strength-word" id="strength-word">—</span>
      </div>
      <div class="strength-bar-bg">
        <div class="strength-bar-fill" id="strength-bar"></div>
      </div>
    </div>
  </div>

  <!-- ── PIN SECTION ── -->
  <div class="section" id="section-pin">
    <label class="label">Tamanho</label>
    <div class="size-group" id="size-group-pin">
      <button class="size-btn selected" data-val="4" onclick="selectSize('pin', this)">
        4 <span>dígitos</span>
      </button>
      <button class="size-btn" data-val="8" onclick="selectSize('pin', this)">
        8 <span>dígitos</span>
      </button>
      <button class="size-btn" data-val="10" onclick="selectSize('pin', this)">
        10 <span>dígitos</span>
      </button>
    </div>

    <button class="gen-btn" onclick="generate('pin')">Gerar PIN</button>

    <div class="output-wrap" id="output-pin">
      <span class="output-text empty" id="text-pin">seu PIN aparece aqui</span>
      <button class="copy-btn" id="copy-pin" onclick="copyText('pin')">copiar</button>
    </div>
  </div>

  <div class="footer">
    baseado em <a href="https://github.com/ralla-zip/password_generator" target="_blank">ralla-zip/password_generator</a>
  </div>
</div>

<script>
  // ── STATE ──
  const state = {
    password: { size: 8 },
    pin:      { size: 4 },
  };

  // ── TAB SWITCH ──
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 ? 'password' : 'pin') === tab);
    });
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + tab).classList.add('active');
  }

  // ── SIZE SELECT ──
  function selectSize(type, btn) {
    const group = document.getElementById('size-group-' + type);
    group.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state[type].size = parseInt(btn.dataset.val);
  }

  // ── CHAR POOLS ──
  const LOWER   = 'abcdefghijklmnopqrstuvwxyz';
  const UPPER   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const DIGITS  = '0123456789';
  const SPECIAL = '#$%&*?@_-';

  // ── CRYPTO RANDOM ──
  function secureRandom(pool, len) {
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(n => pool[n % pool.length]).join('');
  }

  // ── GENERATE ──
  function generate(type) {
    if (type === 'pin') {
      const val = secureRandom(DIGITS, state.pin.size);
      setOutput('pin', val);
      return;
    }

    // password
    let pool = '';
    const useLower   = document.getElementById('opt-lower').checked;
    const useUpper   = document.getElementById('opt-upper').checked;
    const useDigits  = document.getElementById('opt-digits').checked;
    const useSpecial = document.getElementById('opt-special').checked;

    if (useLower)   pool += LOWER;
    if (useUpper)   pool += UPPER;
    if (useDigits)  pool += DIGITS;
    if (useSpecial) pool += SPECIAL;

    if (!pool) { alert('Selecione pelo menos um tipo de caractere.'); return; }

    // guarantee at least one char from each selected type
    let pass = '';
    if (useLower)   pass += secureRandom(LOWER,   1);
    if (useUpper)   pass += secureRandom(UPPER,   1);
    if (useDigits)  pass += secureRandom(DIGITS,  1);
    if (useSpecial) pass += secureRandom(SPECIAL, 1);

    const remaining = state.password.size - pass.length;
    if (remaining > 0) pass += secureRandom(pool, remaining);

    // shuffle
    const arr = pass.split('');
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296 * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    pass = arr.join('');

    setOutput('password', pass);
    updateStrength(pass);
  }

  // ── SET OUTPUT ──
  function setOutput(type, val) {
    const wrap = document.getElementById('output-' + type);
    const span = document.getElementById('text-' + type);

    wrap.classList.add('has-value');
    span.classList.remove('empty', 'animate');
    span.textContent = val;
    void span.offsetWidth; // reflow
    span.classList.add('animate');
    wrap.classList.add('pop');
    setTimeout(() => wrap.classList.remove('pop'), 200);

    // reset copy btn
    const btn = document.getElementById('copy-' + type);
    btn.textContent = 'copiar';
    btn.classList.remove('copied');
  }

  // ── COPY ──
  function copyText(type) {
    const span = document.getElementById('text-' + type);
    if (span.classList.contains('empty')) return;
    navigator.clipboard.writeText(span.textContent).then(() => {
      const btn = document.getElementById('copy-' + type);
      btn.textContent = '✓ copiado';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── STRENGTH ──
  function updateStrength(pass) {
    const wrap = document.getElementById('strength-wrap');
    const bar  = document.getElementById('strength-bar');
    const word = document.getElementById('strength-word');

    wrap.classList.add('visible');

    let score = 0;
    if (pass.length >= 8)  score++;
    if (pass.length >= 12) score++;
    if (pass.length >= 18) score++;
    if (/[a-z]/.test(pass)) score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^a-zA-Z0-9]/.test(pass)) score++;

    const levels = [
      { pct: 15,  label: 'Muito fraca', color: '#C0392B' },
      { pct: 30,  label: 'Fraca',       color: '#C0392B' },
      { pct: 50,  label: 'Razoável',    color: '#D4881A' },
      { pct: 65,  label: 'Boa',         color: '#D4881A' },
      { pct: 80,  label: 'Forte',       color: '#3D6B4F' },
      { pct: 90,  label: 'Muito forte', color: '#3D6B4F' },
      { pct: 100, label: 'Excelente',   color: '#2a5138' },
    ];

    const lvl = levels[Math.min(score, levels.length - 1)];
    bar.style.width      = lvl.pct + '%';
    bar.style.background = lvl.color;
    word.textContent     = lvl.label;
    word.style.color     = lvl.color;
  }
</script>

</body>
</html>
